<!DOCTYPE html>

<title>GitHub AI Trending 报告</title>
<style>
  :root {
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --text: #212529;
    --muted: #6c757d;
    --accent: #0969da;
    --border: #d0d7de;
    --hover-bg: #f3f4f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .container {
    width: 100%;
    max-width: 720px;
  }
  header {
    text-align: center;
    margin-bottom: 36px;
  }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  header p {
    color: var(--muted);
    font-size: 14px;
  }
  .report-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .report-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s, box-shadow 0.15s;
  }
  .report-card:hover {
    background: var(--hover-bg);
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  }
  .date-badge {
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    border-radius: 8px;
    background: #eef5fd;
    color: var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    line-height: 1.1;
  }
  .date-badge .day { font-size: 22px; }
  .date-badge .month { font-size: 11px; opacity: 0.8; }
  .report-info { flex: 1; min-width: 0; }
  .report-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .report-date {
    font-size: 13px;
    color: var(--muted);
  }
  .arrow {
    flex-shrink: 0;
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.2s, color 0.2s;
  }
  .report-card:hover .arrow {
    color: var(--accent);
    transform: translateX(4px);
  }
  .loading, .empty {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 15px;
  }
  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 12px;
    color: var(--muted);
  }
  @media (max-width: 500px) {
    body { padding: 24px 12px; }
    header h1 { font-size: 22px; }
    .report-card { padding: 12px 14px; gap: 12px; }
    .date-badge { width: 46px; height: 46px; }
    .date-badge .day { font-size: 18px; }
  }
</style>
</head>
