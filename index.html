<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub AI Trending 报告</title>
<style>
  :root {
    --bg: #f8f9fa;
    --card-bg: #ffffff;
    --text: #212529;
    --muted: #6c757d;
    --accent: #0969da;
    --border: #d0d7de;
    --hover-bg: #f3f4f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .container {
    width: 100%;
    max-width: 720px;
  }
  header {
    text-align: center;
    margin-bottom: 36px;
  }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
  header p {
    color: var(--muted);
    font-size: 14px;
  }
  .report-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .report-card {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    text-decoration: none;
    color: var(--text);
    transition: background 0.15s, box-shadow 0.15s;
  }
  .report-card:hover {
    background: var(--hover-bg);
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  }
  .date-badge {
    flex-shrink: 0;
    width: 56px;
    height: 56px;
    border-radius: 8px;
    background: #eef5fd;
    color: var(--accent);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    line-height: 1.1;
  }
  .date-badge .day { font-size: 22px; }
  .date-badge .month { font-size: 11px; opacity: 0.8; }
  .report-info { flex: 1; min-width: 0; }
  .report-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .report-date {
    font-size: 13px;
    color: var(--muted);
  }
  .arrow {
    flex-shrink: 0;
    color: var(--muted);
    font-size: 18px;
    transition: transform 0.2s, color 0.2s;
  }
  .report-card:hover .arrow {
    color: var(--accent);
    transform: translateX(4px);
  }
  .loading, .empty {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 15px;
  }
  footer {
    text-align: center;
    margin-top: 40px;
    font-size: 12px;
    color: var(--muted);
  }
  @media (max-width: 500px) {
    body { padding: 24px 12px; }
    header h1 { font-size: 22px; }
    .report-card { padding: 12px 14px; gap: 12px; }
    .date-badge { width: 46px; height: 46px; }
    .date-badge .day { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>GitHub AI Trending 报告</h1>
    <p>自动归档 · 每日 AI 领域热门项目追踪</p>
  </header>
  <div id="reportList" class="report-list">
    <div class="loading">正在加载报告列表…</div>
  </div>
  <footer>
    Powered by GitHub Actions · Auto-generated daily
  </footer>
</div>

<script>
(function() {
  const container = document.getElementById('reportList');
  const API = 'https://api.github.com/repos/youxiaohanpian/githubweekly/contents/';

  fetch(API)
    .then(res => {
      if (!res.ok) {
        if (res.status === 403) {
          throw new Error('API 请求被限流（403），请稍后重试');
        }
        throw new Error('请求失败：HTTP ' + res.status);
      }
      return res.json();
    })
    .then(data => {
      if (!Array.isArray(data)) {
        throw new Error('API 返回数据格式异常');
      }

      const reports = [];
      const monthNames = ['1月','2月','3月','4月','5月','6月',
                          '7月','8月','9月','10月','11月','12月'];
      const weekDays = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

      data.forEach(file => {
        // 只匹配 github-ai-trending-YYYYMMDD.html
        const match = file.name.match(/^github-ai-trending-(\d{8})\.html$/);
        if (!match) return;

        const dateStr = match[1];
        const year = dateStr.slice(0, 4);
        const month = dateStr.slice(4, 6);
        const day = dateStr.slice(6, 8);
        const dateObj = new Date(year, month - 1, day);
        const isoStr = `${year}-${month}-${day}`;
        const weekDay = weekDays[dateObj.getDay()];
        const display = `${year}年${monthNames[parseInt(month)-1]}${parseInt(day)}日 ${weekDay}`;

        reports.push({
          href: file.name,
          isoStr,
          display,
          month: monthNames[parseInt(month)-1],
          day: parseInt(day)
        });
      });

      reports.sort((a, b) => b.isoStr.localeCompare(a.isoStr));

      if (reports.length === 0) {
        container.innerHTML = '<div class="empty">暂无报告</div>';
        return;
      }

      container.innerHTML = reports.map(r => `
        <a class="report-card" href="${r.href}">
          <div class="date-badge">
            <span class="month">${r.month}</span>
            <span class="day">${r.day}</span>
          </div>
          <div class="report-info">
            <div class="report-title">GitHub AI Trending 日报</div>
            <div class="report-date">${r.display}</div>
          </div>
          <span class="arrow">→</span>
        </a>
      `).join('');
    })
    .catch(err => {
      container.innerHTML = '<div class="empty">加载失败：' + err.message + '</div>';
    });
})();
</script>
</body>
</html>
